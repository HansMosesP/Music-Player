<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endpoint Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .tab {
            display: flex;
            margin-bottom: 20px;
        }
        .tab button {
            flex: 1;
            padding: 10px;
            background: #ddd;
            border: none;
            cursor: pointer;
            border-radius: 4px 0 0 4px;
        }
        .tab button:last-child {
            border-radius: 0 4px 4px 0;
        }
        .tab button.active {
            background: #007bff;
            color: white;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        button.logout {
            background: #dc3545;
            margin-top: 20px;
        }
        button.logout:hover {
            background: #c82333;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .hidden {
            display: none;
        }
        .music-player {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .player-header h2 {
            color: #333;
        }
        .user-info {
            font-size: 14px;
            color: #666;
        }
        audio {
            width: 100%;
            margin-bottom: 15px;
        }
        .song-list {
            margin-top: 20px;
        }
        .song-item {
            background: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎵 Endpoint Music Player</h1>

        <!-- Auth Section -->
        <div id="authSection">
            <div class="tab">
                <button id="loginTab" class="active">Login</button>
                <button id="registerTab">Register</button>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email:</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit">Login</button>
            </form>

            <form id="registerForm" class="hidden">
                <div class="form-group">
                    <label for="registerUsername">Username:</label>
                    <input type="text" id="registerUsername" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email:</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password:</label>
                    <input type="password" id="registerPassword" required>
                </div>
                <button type="submit">Register</button>
            </form>

            <div id="authMessage"></div>
        </div>

        <!-- Music Player Section -->
        <div id="playerSection" class="hidden">
            <div class="music-player">
                <div class="player-header">
                    <h2>Now Playing</h2>
                    <div class="user-info">
                        <p>Logged in as: <strong id="currentUsername"></strong></p>
                    </div>
                </div>

                <audio id="audioPlayer" controls>
                    <source src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>

                <div class="song-list">
                    <h3>Songs</h3>
                    <div id="songList"></div>
                </div>

                <button class="logout" id="logoutBtn">Logout</button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const authSection = document.getElementById('authSection');
        const playerSection = document.getElementById('playerSection');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const authMessage = document.getElementById('authMessage');
        const audioPlayer = document.getElementById('audioPlayer');
        const currentUsername = document.getElementById('currentUsername');
        const songList = document.getElementById('songList');
        const logoutBtn = document.getElementById('logoutBtn');

        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                showMusicPlayer(user);
            }
        });

        // Tab switching
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            authMessage.innerHTML = '';
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            authMessage.innerHTML = '';
        });

        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMusicPlayer(data.user);
                    authMessage.innerHTML = '';
                } else {
                    authMessage.innerHTML = `<div class="message error">${data.error}</div>`;
                }
            } catch (error) {
                authMessage.innerHTML = `<div class="message error">Network error</div>`;
            }
        });

        // Register
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    authMessage.innerHTML = `<div class="message success">${data.message} You can now login.</div>`;
                    setTimeout(() => {
                        loginTab.click();
                        registerForm.reset();
                    }, 1500);
                } else {
                    authMessage.innerHTML = `<div class="message error">${data.error}</div>`;
                }
            } catch (error) {
                authMessage.innerHTML = `<div class="message error">Network error</div>`;
            }
        });

        // Show music player
        function showMusicPlayer(user) {
            authSection.classList.add('hidden');
            playerSection.classList.remove('hidden');
            currentUsername.textContent = user.username;
            loadSongs(user.id);
        }

        // Load songs
        async function loadSongs(userId) {
            try {
                const response = await fetch('/api/music/list', {
                    headers: { 'Authorization': `Bearer ${userId}` }
                });
                const data = await response.json();
                
                if (response.ok) {
                    songList.innerHTML = '';
                    data.songs.forEach(song => {
                        const songDiv = document.createElement('div');
                        songDiv.className = 'song-item';
                        songDiv.innerHTML = `
                            <span>${song.title}</span>
                            <button onclick="playSong('${userId}')">Play</button>
                        `;
                        songList.appendChild(songDiv);
                    });
                }
            } catch (error) {
                songList.innerHTML = '<p>Error loading songs</p>';
            }
        }

        // Play song
        window.playSong = function(userId) {
            audioPlayer.src = `/api/music/play?token=${userId}`;
            audioPlayer.play();
        };

        // Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('user');
            authSection.classList.remove('hidden');
            playerSection.classList.add('hidden');
            loginForm.reset();
            registerForm.reset();
            audioPlayer.pause();
            audioPlayer.src = '';
            loginTab.click();
        });
    </script>
</body>

</html>
